<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Cast</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!--Custom CSS-->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card text-center w-50 mx-auto">

        <!--Card Header-->
        <div class="card-header">
            <span class="badge text-bg-primary">SkyCast</span>
        </div>

        <!--Card Body-->
        <div class="card-body">

            <!--Default Forecast-->
            <div class="row g-2">

                <div class="col-12 col-sm-4 mb-3">
                    <div class="card text-bg-primary mb-3">
                        <div class="card-header">Temperature <i class="bi bi-thermometer-half"></i></div>
                        <div class="card-body">
                            <h4 id="temp"></h4>   
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-4 mb-3">
                    <div class="card text-bg-secondary mb-3">
                        <div class="card-header">Humidity <i class="bi bi-droplet"></i></div>
                        <div class="card-body">
                            <h4 id="humidity"></h4>   
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-4 mb-3">
                    <div class="card text-bg-success mb-3">
                        <div class="card-header">Wind <i class="bi bi-wind"></i></div>
                        <div class="card-body">
                            <h4 id="wind"></h4>   
                        </div>
                    </div>
                </div>

            </div>

            <!--Location & Search Bar-->
            <div>

                <!--Location-->
                <div class="my-3">
                    <h5 class="mb-0" id="country"></h5>
                    <small class="text-muted" id="city"></small>
                </div>

                <!--Search Input with Autocomplete-->
                <div class="d-flex flex-column flex-sm-row gap-2 my-3 position-relative">
                    <input type="text" id="searchInput" class="form-control mb-2 mb-sm-0" placeholder="Search for city...">
                    <button class="btn btn-primary btn-sm" id="searchBtn">Search</button>

                    <!-- Autocomplete suggestions -->
                    <div id="suggestions" class="list-group position-absolute w-100" style="z-index: 10; top: 100%; margin-top: 10px;"></div>
                </div>

            </div>

            <!--Daily Forecast Information-->
            <div class="p-5">

                <button type="button" id="forecastInfo" class="btn btn-sm btn-outline-secondary mb-2" data-bs-toggle="collapse" data-bs-target="#infoContent">
                    <i class="bi bi-info-circle"></i> Info <i class="bi bi-chevron-down"></i>
                </button>

                <div class="collapse" id="infoContent">
                    <div class="card card-body mt-2 table-responsive">
                        
                        <table class="table table-sm">
                    <thead class="table-warning">
                        <tr>
                            <th scope="col">Days</th>
                            <th scope="col"><i class="bi bi-thermometer-half"></i></th>
                            <th scope="col"><i class="bi bi-droplet"></i></th>
                            <th scope="col"><i class="bi bi-wind"></i></th>
                        </tr>
                    </thead>
                    <tbody id="forecastTableBody">
                        <tr>
                            <th scope="row">Yesterday</th>
                            <td>20</td>
                            <td>20</td>
                            <td>20</td>
                        </tr>
                        <tr>
                            <th scope="row">Monday</th>
                            <td>20</td>
                            <td>20</td>
                            <td>20</td>
                        </tr>
    
                    </tbody>

                </table>

                    </div>
                </div>


            </div>

            

        </div>

        <!--Card Footer-->
        <div class="card-footer bg-light p-3">

            <div class="row g-3">

                <!-- Country Card 1 -->
                <div class="col-12 col-md-4 col-xl-3 mb-3">
                    
                </div>

                <!-- Country Card 2 -->
                <div class="col-12 col-md-4 col-xl-3 mb-3">
                    
                </div>

                <!-- Country Card 3 -->
                <div class="col-12 col-md-4 col-xl-3 mb-3">
                    
                </div>

            </div>

            <!--Buttons-->
            <div class="d-flex flex-column gap-2 mt-2">

                <button type="button" id="addMoreBtn" class="btn btn-sm btn-outline-success" data-bs-toggle="modal" data-bs-target="#exampleModal">Add More</button>
                <button type="button" id="seeMoreBtn" class="btn btn-sm btn-outline-secondary">See More</button>
               
            </div>

             <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Add More Forecasts</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-start">
                        <span class="badge text-bg-danger mb-2 d-inline-block">Country Name</span> <i class="bi bi-flag-fill"></i>
                        <input type="text" id="newCountryInput" class="form-control form-control-sm" placeholder="Add Country Name">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Save</button>
                    </div>
                    </div>
                </div>
                </div>


        </div>


    </div>

    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!--Custom JS-->
    <script src="js/script.js"></script>   

</body>
</html>
